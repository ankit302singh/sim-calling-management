<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Assignment History</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4">Assignment History</h2>

    <table class="table table-bordered table-hover">

        <thead class="table-dark">

        <tr>

            <th>SIM Number</th>
            <th>Employee</th>
            <th>Org</th>
            <th>Phone Label</th>
            <th>Assigned Date</th>
            <th>Removed Date</th>
            <th>Reason</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="history : ${historyList}">

            <td th:text="${history.simNumber}"></td>

            <td th:text="${history.employeeName}"></td>

            <td th:text="${history.org}"></td>

            <td th:text="${history.phoneLabel}"></td>

            <td th:text="${history.assignedDate}"></td>

            <td th:text="${history.removedDate}"></td>

            <td th:text="${history.reason}"></td>

        </tr>

        </tbody>

    </table>

    <a href="/dashboard"
       class="btn btn-secondary">
        Back to Dashboard
    </a>

</div>

</body>
</html>

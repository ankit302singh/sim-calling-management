<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Add SIM</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h4>Add SIM</h4>

        </div>

        <div class="card-body">

            <form method="post" action="/sims/save">

                <div class="mb-3">
                    <label>Org</label>
                    <input type="text" name="org"
                           class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Phone Label</label>
                    <input type="text" name="phoneLabel"
                           class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>SIM Number</label>
                    <input type="text" name="simNumber"
                           class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Mobile Number</label>
                    <input type="text" name="mobileNumber"
                           class="form-control" required>
                </div>

				<div class="mb-3">
				    <label>Status</label>

				    <select name="status"
				            class="form-control">

				        <option value="CALLED">CALLED</option>

				        <option value="INACTIVE">INACTIVE</option>

				        <option value="NO_SIM">NO SIM</option>

				        <option value="NO_NETWORK">NO NETWORK</option>

				        <option value="CALL_FAILED">CALL FAILED</option>

				        <option value="OTHER">OTHER</option>

				    </select>

				</div>

                <div class="mb-3">
                    <label>Assigned Employee</label>
                    <input type="text" name="assignedEmployee"
                           class="form-control">
                </div>

                <div class="mb-3">
                    <label>Remarks</label>
                    <textarea name="remarks"
                              class="form-control"></textarea>
                </div>

                <button class="btn btn-success">
                    Save SIM
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>

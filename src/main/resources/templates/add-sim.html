<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Add SIM</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h4>Add SIM</h4>

        </div>

        <div class="card-body">

			<form th:action="@{/sims/save}"
			      th:object="${simData}"
			      method="post">
				  
				  <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label>Org</label>
					<input type="text"
					       th:field="*{org}"
					       class="form-control"
					       required>
                </div>

                <div class="mb-3">
                    <label>Phone Label</label>
					<input type="text"
					       th:field="*{phoneLabel}"
					       class="form-control"
					       required>
                </div>

                <div class="mb-3">
                    <label>SIM Number</label>
					<input type="text"
					       th:field="*{simNumber}"
					       class="form-control"
					       required>
                </div>

                <div class="mb-3">
                    <label>Mobile Number</label>
					<input type="text"
					       th:field="*{mobileNumber}"
					       class="form-control"
					       required>
                </div>

				<div class="mb-3">
				    <label>Status</label>

					<select th:field="*{status}"
					        class="form-control">

				        <option value="CALLED">CALLED</option>

				        <option value="INACTIVE">INACTIVE</option>

				        <option value="NO_SIM">NO SIM</option>

				        <option value="NO_NETWORK">NO NETWORK</option>

				        <option value="CALL_FAILED">CALL FAILED</option>

				        <option value="OTHER">OTHER</option>

				    </select>

				</div>

				<div class="mb-3">

				    <label>Assigned Employee</label>

				    <select th:field="*{assignedEmployee}"
				            class="form-control">

				        <option value="">-- Select Employee --</option>

				        <option th:each="employee : ${employees}"
				                th:value="${employee.name}"
				                th:text="${employee.name}">
				        </option>

				    </select>

				</div>

                <div class="mb-3">
                    <label>Remarks</label>
					<textarea th:field="*{remarks}"
					          class="form-control"></textarea>
                </div>

                <button class="btn btn-success">
                    Save SIM
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body style="background:#f4f6f9;">

<div class="container-fluid">

    <div class="row">

        <!-- Sidebar -->

        <div class="col-md-2 bg-dark text-white min-vh-100 p-3">

            <h4>
                <i class="fa-solid fa-sim-card"></i>
                SIM Manager
            </h4>

            <hr>

            <ul class="nav flex-column">

                <li class="nav-item mb-2">
                    <a href="/dashboard" class="nav-link text-white">
                        <i class="fa-solid fa-chart-line"></i>
                        Dashboard
                    </a>
                </li>

                <li class="nav-item mb-2">
                    <a href="/sims" class="nav-link text-white">
                        <i class="fa-solid fa-sim-card"></i>
                        SIM Management
                    </a>
                </li>

                <li class="nav-item mb-2">
                    <a href="/employees" class="nav-link text-white">
                        <i class="fa-solid fa-users"></i>
                        Employees
                    </a>
                </li>

            </ul>

        </div>

        <!-- Main Content -->

        <div class="col-md-10 p-4">

            <h2 class="mb-4">
                SIM Calling Management Dashboard
            </h2>

            <div class="row">

                <div class="col-md-3 mb-3">
                    <div class="card shadow border-0 bg-primary text-white">
                        <div class="card-body">
                            <h6>Total SIMs</h6>
                            <h2 th:text="${totalSims}">0</h2>
                        </div>
                    </div>
                </div>

                <div class="col-md-3 mb-3">
                    <div class="card shadow border-0 bg-success text-white">
                        <div class="card-body">
                            <h6>CALLED</h6>
                            <h2 th:text="${calledCount}">0</h2>
                        </div>
                    </div>
                </div>

                <div class="col-md-3 mb-3">
                    <div class="card shadow border-0 bg-danger text-white">
                        <div class="card-body">
                            <h6>INACTIVE</h6>
                            <h2 th:text="${inactiveCount}">0</h2>
                        </div>
                    </div>
                </div>

                <div class="col-md-3 mb-3">
                    <div class="card shadow border-0 bg-dark text-white">
                        <div class="card-body">
                            <h6>NO SIM</h6>
                            <h2 th:text="${noSimCount}">0</h2>
                        </div>
                    </div>
                </div>

            </div>

            <div class="row">

                <div class="col-md-4 mb-3">
                    <div class="card shadow border-0 bg-warning">
                        <div class="card-body">
                            <h6>NO NETWORK</h6>
                            <h2 th:text="${noNetworkCount}">0</h2>
                        </div>
                    </div>
                </div>

                <div class="col-md-4 mb-3">
                    <div class="card shadow border-0 bg-secondary text-white">
                        <div class="card-body">
                            <h6>CALL FAILED</h6>
                            <h2 th:text="${callFailedCount}">0</h2>
                        </div>
                    </div>
                </div>

                <div class="col-md-4 mb-3">
                    <div class="card shadow border-0 bg-info text-white">
                        <div class="card-body">
                            <h6>OTHER</h6>
                            <h2 th:text="${otherCount}">0</h2>
                        </div>
                    </div>
                </div>

            </div>

            <div class="card shadow border-0 mt-4">

                <div class="card-header bg-white">
                    <h5 class="mb-0">Quick Actions</h5>
                </div>

                <div class="card-body">

                    <a href="/sims/add"
                       class="btn btn-primary">
                        Add SIM
                    </a>

                    <a href="/employees/add"
                       class="btn btn-success ms-2">
                        Add Employee
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>

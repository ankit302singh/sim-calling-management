<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>SIM Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="d-flex justify-content-between mb-3">

        <h2>SIM Management</h2>

        <a href="/sims/add"
           class="btn btn-primary">
            Add SIM
        </a>

    </div>

    <table class="table table-bordered table-striped">

        <thead>

        <tr>
            <th>ID</th>
            <th>Org</th>
            <th>Phone Label</th>
            <th>SIM Number</th>
            <th>Mobile Number</th>
            <th>Status</th>
            <th>Assigned Employee</th>
			<th>Action</th>
        </tr>

        </thead>

        <tbody>

        <tr th:each="sim : ${sims}">

            <td th:text="${sim.id}"></td>

            <td th:text="${sim.org}"></td>

            <td th:text="${sim.phoneLabel}"></td>

            <td th:text="${sim.simNumber}"></td>

            <td th:text="${sim.mobileNumber}"></td>

			<td>

			    <span th:if="${sim.status.name() == 'CALLED'}"
			          class="badge bg-success">
			        CALLED
			    </span>

			    <span th:if="${sim.status.name() == 'INACTIVE'}"
			          class="badge bg-danger">
			        INACTIVE
			    </span>

			    <span th:if="${sim.status.name() == 'NO_SIM'}"
			          class="badge bg-dark">
			        NO SIM
			    </span>

			    <span th:if="${sim.status.name() == 'NO_NETWORK'}"
			          class="badge bg-warning text-dark">
			        NO NETWORK
			    </span>

			    <span th:if="${sim.status.name() == 'CALL_FAILED'}"
			          class="badge bg-secondary">
			        CALL FAILED
			    </span>

			    <span th:if="${sim.status.name() == 'OTHER'}"
			          class="badge bg-info text-dark">
			        OTHER
			    </span>

			</td>

            <td th:text="${sim.assignedEmployee}"></td>
			
			<td>
			       <a th:href="@{/sims/edit/{id}(id=${sim.id})}"
			          class="btn btn-warning btn-sm">
			           Edit
			       </a>
			   </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>

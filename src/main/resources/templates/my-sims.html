<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>My Assigned Phones</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body style="background:#f4f6f9;">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h2>
                My Assigned Phones
            </h2>

            <p class="text-muted mb-0">
                Welcome,
                <strong th:text="${employee.name}"></strong>
            </p>

        </div>

        <a href="/employee/dashboard"
           class="btn btn-secondary">

            <i class="fa-solid fa-arrow-left"></i>

            Back

        </a>

    </div>

    <div class="card shadow">

        <div class="card-body">

            <table class="table table-bordered table-hover align-middle">

                <thead class="table-dark">

                <tr>

                    <th>Phone Label</th>

                    <th>SIM Number</th>

                    <th>Mobile Number</th>

                    <th>Status</th>

                    <th>Remarks</th>

                    <th>Action</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="sim : ${mySims}">

                    <td th:text="${sim.phoneLabel}"></td>

                    <td th:text="${sim.simNumber}"></td>

                    <td th:text="${sim.mobileNumber}"></td>

                    <td th:text="${sim.status}"></td>

                    <td th:text="${sim.remarks}"></td>

                    <td>

                        <a th:href="@{'/employee/update/' + ${sim.id}}"
                           class="btn btn-warning btn-sm">

                            <i class="fa-solid fa-pen"></i>

                            Update

                        </a>

                    </td>

                </tr>

                <tr th:if="${#lists.isEmpty(mySims)}">

                    <td colspan="6"
                        class="text-center text-muted">

                        No SIMs assigned.

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>

</html>

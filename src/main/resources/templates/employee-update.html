<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Update SIM Status</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body style="background:#f4f6f9;">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h4>Update SIM Status</h4>

        </div>

        <div class="card-body">

            <form method="post" action="/employee/update">

                <!-- Hidden ID -->
                <input type="hidden"
                       name="id"
                       th:value="${sim.id}">

                <!-- Read Only Fields -->

                <div class="mb-3">
                    <label>Organization</label>
                    <input type="text"
                           class="form-control"
                           th:value="${sim.org}"
                           readonly>
                </div>

                <div class="mb-3">
                    <label>Phone Label</label>
                    <input type="text"
                           class="form-control"
                           th:value="${sim.phoneLabel}"
                           readonly>
                </div>

                <div class="mb-3">
                    <label>SIM Number</label>
                    <input type="text"
                           class="form-control"
                           th:value="${sim.simNumber}"
                           readonly>
                </div>

                <div class="mb-3">
                    <label>Mobile Number</label>
                    <input type="text"
                           class="form-control"
                           th:value="${sim.mobileNumber}"
                           readonly>
                </div>

                <!-- Editable -->

                <div class="mb-3">

                    <label>Status</label>

                    <select class="form-control"
                            name="status">

                        <option value="CALLED"
                                th:selected="${sim.status.name()=='CALLED'}">
                            CALLED
                        </option>

                        <option value="INACTIVE"
                                th:selected="${sim.status.name()=='INACTIVE'}">
                            INACTIVE
                        </option>

                        <option value="NO_SIM"
                                th:selected="${sim.status.name()=='NO_SIM'}">
                            NO SIM
                        </option>

                        <option value="NO_NETWORK"
                                th:selected="${sim.status.name()=='NO_NETWORK'}">
                            NO NETWORK
                        </option>

                        <option value="CALL_FAILED"
                                th:selected="${sim.status.name()=='CALL_FAILED'}">
                            CALL FAILED
                        </option>

                        <option value="OTHER"
                                th:selected="${sim.status.name()=='OTHER'}">
                            OTHER
                        </option>

                    </select>

                </div>

                <div class="mb-3">

                    <label>Remarks</label>

                    <textarea class="form-control"
                              name="remarks"
                              rows="4"
                              th:text="${sim.remarks}"></textarea>

                </div>

                <button class="btn btn-success">

                    Save

                </button>

                <a href="/employee/my-sims"
                   class="btn btn-secondary">

                    Back

                </a>

            </form>

        </div>

    </div>

</div>

</body>

</html>
